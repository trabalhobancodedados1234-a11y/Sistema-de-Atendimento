<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0f1a;
      --panel: #131729;
      --border: rgba(255,255,255,0.07);
      --accent: #e05c3a;
      --accent2: #f5a97e;
      --text: #edeef5;
      --muted: #7a7e97;
      --input-bg: rgba(255,255,255,0.04);
      --radius: 14px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 480px; height: 480px;
      background: var(--accent);
      top: -120px; left: -100px;
      animation: drift 9s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 360px; height: 360px;
      background: #4a6cf7;
      bottom: -80px; right: -60px;
      animation: drift 12s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 44px;
      width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: slideUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 20px; height: 20px; fill: #fff; }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.9rem;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 32px;
      font-weight: 300;
    }

    /* Form */
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--muted); opacity: 0.6; }
    input:focus {
      border-color: var(--accent);
      background: rgba(224,92,58,0.06);
      box-shadow: 0 0 0 3px rgba(224,92,58,0.12);
    }
    input:focus + svg, .input-wrap:focus-within svg { stroke: var(--accent); }

    /* Toggle senha */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-pw svg {
      position: static;
      transform: none;
      width: 16px; height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }
    .toggle-pw:hover svg { stroke: var(--accent2); }

    /* Esqueceu a senha */
    .row-opts {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }
    .link-sm {
      font-size: 0.78rem;
      color: var(--accent2);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .link-sm:hover { opacity: 0.7; }

    /* Botão */
    .btn-login {
      width: 100%;
      margin-top: 26px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #c94528 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      box-shadow: 0 6px 24px rgba(224,92,58,0.28);
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 10px 32px rgba(224,92,58,0.38); }
    .btn-login:hover::after { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    /* Spinner no botão */
    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }

    /* Divisor */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 22px;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Rodapé */
    .footer-text {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .footer-text a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .footer-text a:hover { opacity: 0.7; }

    /* Feedback de erro */
    .error-msg {
      display: none;
      background: rgba(224,92,58,0.12);
      border: 1px solid rgba(224,92,58,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--accent2);
      margin-bottom: 18px;
    }
    .error-msg.show { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Gestão Pro</span>
    </div>

    <h1>Bem&#8209;vindo de volta</h1>
    <p class="subtitle">Entre com suas credenciais para continuar</p>

    <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8l10 7 10-7"/></svg>
      </div>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <button class="toggle-pw" type="button" onclick="toggleSenha(this)" aria-label="Mostrar senha">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="row-opts">
        <a href="#" class="link-sm">Esqueceu a senha?</a>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">
      <span class="btn-text">Entrar</span>
      <div class="spinner"></div>
    </button>

    <div class="divider">ou</div>

    <p class="footer-text">Não tem conta? <a href="#">Cadastre-se grátis</a></p>
  </div>

  <script>
    function toggleSenha(btn) {
      const input = document.getElementById('senha');
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');

      err.classList.remove('show');
      if (!email || !senha) {
        err.textContent = 'Preencha todos os campos.';
        err.classList.add('show');
        return;
      }

      btn.classList.add('loading');
      setTimeout(() => {
        btn.classList.remove('loading');
        // Simulação: só aceita demo@email.com / 123456
        if (email === 'demo@email.com' && senha === '123456') {
          btn.style.background = 'linear-gradient(135deg,#27ae60,#1e8449)';
          btn.querySelector('.btn-text').textContent = '✓ Acesso liberado!';
          btn.querySelector('.btn-text').style.display = 'block';
        } else {
          err.textContent = 'E-mail ou senha incorretos. Tente novamente.';
          err.classList.add('show');
        }
      }, 1400);
    }

    // Enter para logar
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
